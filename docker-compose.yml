version: '3.8'
services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: eco_bottle
    volumes:
      - mongo-data:/data/db
  redis:
    image: redis:7-alpine
    restart: unless-stopped
  api:
    build: ./backend
    env_file: ./backend/.env.example
    depends_on:
      - mongo
      - redis
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
    deploy:
      replicas: 1
  frontend:
    build: ./frontend
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: /api
      API_BASE_URL: http://api:4000
    ports:
      - '3000:3000'
  nginx:
    image: nginx:1.25-alpine
    depends_on:
      - frontend
      - api
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - '8080:80'
  prometheus:
    image: prom/prometheus:v2.48.0
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - '9090:9090'
volumes:
  mongo-data:
